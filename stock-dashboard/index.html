<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Stock Board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">PRIVATE MARKET VIEW</p>
          <h1>내 주식 한눈에 보기</h1>
        </div>
        <div class="sync-panel" aria-live="polite">
          <span id="connectionDot" class="status-dot demo"></span>
          <div>
            <strong id="connectionLabel">데모 실시간</strong>
            <span id="lastUpdated">아직 업데이트 전</span>
          </div>
          <button id="refreshButton" class="icon-button" type="button" title="새로고침" aria-label="새로고침">
            <span aria-hidden="true">R</span>
          </button>
        </div>
      </header>

      <section class="summary-grid" aria-label="포트폴리오 요약">
        <article class="metric">
          <span>평가금액</span>
          <strong id="totalValue">-</strong>
          <small id="totalCost">매입금액 -</small>
        </article>
        <article class="metric">
          <span>평가손익</span>
          <strong id="totalProfit">-</strong>
          <small id="totalProfitRate">-</small>
        </article>
        <article class="metric">
          <span>오늘 변동</span>
          <strong id="dayChange">-</strong>
          <small id="dayChangeRate">-</small>
        </article>
        <article class="metric">
          <span>관심종목</span>
          <strong id="watchCount">-</strong>
          <small id="nextRefresh">자동 갱신 대기</small>
        </article>
      </section>

      <section class="workspace">
        <aside class="side-panel" aria-label="설정과 종목 추가">
          <section class="panel-block">
            <div class="panel-title">
              <h2>실시간 설정</h2>
              <span id="providerBadge">Demo</span>
            </div>
            <label class="field">
              <span>Finnhub API Token</span>
              <input id="apiToken" type="password" autocomplete="off" placeholder="token 입력" />
            </label>
            <label class="field">
              <span>갱신 주기</span>
              <select id="refreshInterval">
                <option value="5">5초</option>
                <option value="10">10초</option>
                <option value="15">15초</option>
                <option value="30">30초</option>
                <option value="60">60초</option>
              </select>
            </label>
            <div class="button-row">
              <button id="saveSettings" class="primary-button" type="button">저장</button>
              <button id="clearToken" class="ghost-button" type="button">토큰 삭제</button>
            </div>
          </section>

          <section class="panel-block">
            <div class="panel-title">
              <h2>종목 추가</h2>
            </div>
            <form id="addForm" class="stock-form">
              <label class="field">
                <span>심볼</span>
                <input id="symbolInput" type="text" placeholder="AAPL, NVDA, 005930.KS" required />
              </label>
              <label class="field">
                <span>이름</span>
                <input id="nameInput" type="text" placeholder="Apple, 삼성전자" />
              </label>
              <div class="split-fields">
                <label class="field">
                  <span>수량</span>
                  <input id="sharesInput" type="number" min="0" step="0.0001" placeholder="0" />
                </label>
                <label class="field">
                  <span>평단</span>
                  <input id="avgCostInput" type="number" min="0" step="0.01" placeholder="0" />
                </label>
              </div>
              <button class="primary-button wide" type="submit">추가</button>
            </form>
          </section>
        </aside>

        <section class="board" aria-label="주식 대시보드">
          <div class="board-toolbar">
            <div class="tabs" role="tablist" aria-label="보기 방식">
              <button class="tab active" id="tableTab" type="button">보유/관심</button>
              <button class="tab" id="heatTab" type="button">변동률</button>
            </div>
            <div class="search-box">
              <input id="searchInput" type="search" placeholder="종목 검색" />
            </div>
          </div>

          <div id="tableView" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th>현재가</th>
                  <th>오늘</th>
                  <th>추세</th>
                  <th>수량</th>
                  <th>평단</th>
                  <th>평가손익</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="stockRows"></tbody>
            </table>
          </div>

          <div id="heatView" class="heat-grid hidden" aria-label="변동률 보기"></div>
        </section>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <td>
          <div class="stock-name">
            <strong data-field="symbol"></strong>
            <span data-field="name"></span>
          </div>
        </td>
        <td>
          <strong data-field="price"></strong>
          <small data-field="previousClose"></small>
        </td>
        <td>
          <strong data-field="change"></strong>
          <small data-field="changeRate"></small>
        </td>
        <td><canvas width="130" height="42" data-field="sparkline"></canvas></td>
        <td><input class="mini-input" data-field="shares" type="number" min="0" step="0.0001" /></td>
        <td><input class="mini-input" data-field="avgCost" type="number" min="0" step="0.01" /></td>
        <td>
          <strong data-field="profit"></strong>
          <small data-field="profitRate"></small>
        </td>
        <td>
          <button class="icon-button subtle" data-field="remove" type="button" title="삭제" aria-label="삭제">
            <span aria-hidden="true">X</span>
          </button>
        </td>
      </tr>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
